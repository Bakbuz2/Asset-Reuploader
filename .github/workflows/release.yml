name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o Asset-Reuploader-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: Asset-Reuploader-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: '**/Asset-Reuploader-*'
          body: |
            # Asset Reuploader - No Rate Limits Edition
            
            This release includes all rate limiting removed for maximum performance.
            
            ## Changes:
            - ✅ Removed fixed window rate limiter delays
            - ✅ Removed interval throttling from task queue
            - ✅ Removed animation upload exponential backoff
            - ✅ Removed rate limit detection and handling
            
            ## Performance:
            Uploads now process at maximum speed without internal throttling.
            
            **Note:** External API rate limits from Roblox may still apply.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
